<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FitTracker">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <title>FitTracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-inner">
        <div class="header-left">
          <span class="app-logo">💪</span>
          <div>
            <h1 class="app-name">FitTracker</h1>
            <p class="app-date" id="headerDate"></p>
          </div>
        </div>
        <button class="icon-btn" id="btnSettings" title="Configuración">
          <i class="bi bi-gear-fill"></i>
        </button>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="app-content" id="mainContent"></main>

    <!-- FAB -->
    <button class="fab" id="fabBtn" style="display:none" title="Añadir">
      <i class="bi bi-plus-lg"></i>
    </button>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn" data-view="home">
        <i class="bi bi-house-fill"></i>
        <span>Inicio</span>
      </button>
      <button class="nav-btn" data-view="exercises">
        <i class="bi bi-lightning-fill"></i>
        <span>Ejercicios</span>
      </button>
      <button class="nav-btn" data-view="metrics">
        <i class="bi bi-graph-up"></i>
        <span>Métricas</span>
      </button>
      <button class="nav-btn" data-view="diet">
        <i class="bi bi-basket2-fill"></i>
        <span>Dieta</span>
      </button>
    </nav>

  </div>

  <!-- MODALS -->
  <div id="modalContainer"></div>
  <div class="modal-backdrop" id="modalBackdrop"></div>

  <script src="app.js"></script>
</body>
</html>
